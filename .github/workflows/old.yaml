name: Security Scan (Trivy)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write # Optional: if you want to upload SARIF results to GitHub Security tab

jobs:
  scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-dir: '.'
          format: 'table'
          exit-code: '1' # Fails the PR/pipeline if vulnerabilities are found
          severity: 'HIGH,CRITICAL' # Matches your high-severity threshold
          ignore-unfixed: true
